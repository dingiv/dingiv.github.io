name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout blog
        uses: actions/checkout@v4

      - name: Checkout VitePress fork
        uses: actions/checkout@v4
        with:
          repository: dingiv/vitepress
          ref: div
          path: vitepress

      - name: Clean fork .git
        run: rm -rf vitepress/.git

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts
        env:
          CI: true

      - name: Build VitePress fork
        run: cd vitepress && pnpm build

      - name: Build blog
        run: pnpm exec vitepress build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs
