name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 检出博客源码
      - name: Checkout blog
        uses: actions/checkout@v4

      # 检出自定义 VitePress fork
      - name: Checkout VitePress fork
        uses: actions/checkout@v4
        with:
          repository: dingiv/vitepress
          ref: div
          path: vitepress

      # 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      # 安装所有依赖（workspace 会处理 vitepress）
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 构建 VitePress fork
      - name: Build VitePress fork
        run: cd vitepress && pnpm build

      # 构建博客
      - name: Build blog
        run: pnpm exec vitepress build

      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs
